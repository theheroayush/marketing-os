<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#0c0a1d">
  <meta name="mobile-web-app-capable" content="yes">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>MarkU | AI Marketing Skills</title>
  <meta name="description" content="MarkU — 34 AI-powered marketing skills for CRO, copywriting, SEO, paid ads, growth engineering and more.">
  <link rel="manifest" href="manifest.json">
  <link rel="stylesheet" href="styles.css">
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              "tertiary-dim": "#40ceed",
              "tertiary-fixed": "#53ddfc",
              "on-tertiary-container": "#004b58",
              "on-error": "#490013",
              "on-secondary": "#33005b",
              "on-secondary-fixed-variant": "#7511c3",
              "secondary-fixed": "#e5c6ff",
              "primary-container": "#9396ff",
              "on-primary-fixed-variant": "#0e009d",
              "on-primary": "#0f00a4",
              "error": "#ff6e84",
              "tertiary-fixed-dim": "#40ceed",
              "error-container": "#a70138",
              "on-primary-container": "#0a0081",
              "outline": "#7a6f9b",
              "outline-variant": "#4b426a",
              "primary-dim": "#6063ee",
              "on-primary-fixed": "#000000",
              "tertiary-container": "#53ddfc",
              "surface-bright": "#30215d",
              "error-dim": "#d73357",
              "surface": "#10062d",
              "surface-container-highest": "#291c53",
              "secondary-fixed-dim": "#dbb4ff",
              "on-background": "#eae1ff",
              "surface-tint": "#a3a6ff",
              "on-error-container": "#ffb2b9",
              "on-secondary-container": "#e9cdff",
              "primary-fixed": "#9396ff",
              "secondary": "#c180ff",
              "surface-container": "#1c113f",
              "on-tertiary": "#005464",
              "surface-container-high": "#231649",
              "surface-dim": "#10062d",
              "surface-variant": "#291c53",
              "primary-fixed-dim": "#8387ff",
              "tertiary": "#8ce7ff",
              "secondary-dim": "#9c48ea",
              "inverse-primary": "#494bd7",
              "on-secondary-fixed": "#4f0089",
              "surface-container-low": "#160b36",
              "inverse-surface": "#fdf7ff",
              "background": "#10062d",
              "surface-container-lowest": "#000000",
              "on-surface-variant": "#b0a4d3",
              "inverse-on-surface": "#594f78",
              "secondary-container": "#6f00be",
              "primary": "#a3a6ff",
              "on-tertiary-fixed": "#003640",
              "on-tertiary-fixed-variant": "#005564",
              "on-surface": "#eae1ff"
            },
            fontFamily: {
              "headline": ["Plus Jakarta Sans"],
              "body": ["Manrope"],
              "label": ["Manrope"]
            },
            borderRadius: {"DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px"},
          },
        },
      }
    </script>
<style>
        body { font-family: 'Manrope', sans-serif; }
        .font-plus-jakarta { font-family: 'Plus Jakarta Sans', sans-serif; }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
</head>
<body>

  <!-- Desktop Sidebar -->
  <aside class="desktop-sidebar">
    <div class="sidebar-logo" onclick="app.navigate('dashboard')" style="cursor:pointer; display:flex; align-items:center; gap:10px;">
      <img src="logo.jpg" alt="" class="sidebar-logo-img">
      MarkU
    </div>
    <button class="sidebar-item" data-view="dashboard" onclick="app.navigate('dashboard')">
      <span class="material-symbols-outlined">home</span> Dashboard
    </button>
    <button class="sidebar-item" data-view="settings" onclick="app.navigate('settings')">
      <span class="material-symbols-outlined">settings</span> Settings
    </button>
    <button class="sidebar-item" data-view="skills" onclick="app.navigate('skills')">
      <span class="material-symbols-outlined">auto_awesome</span> Skills Hub
    </button>
    <button class="sidebar-item" data-view="content" onclick="app.navigate('content')">
      <span class="material-symbols-outlined">edit_note</span> Content
    </button>
    <button class="sidebar-item" data-view="campaigns" onclick="app.navigate('campaigns')">
      <span class="material-symbols-outlined">campaign</span> Campaigns
    </button>
    <button class="sidebar-item" data-view="analytics" onclick="app.navigate('analytics')">
      <span class="material-symbols-outlined">insights</span> Analytics
    </button>
    <button class="sidebar-item" data-view="history" onclick="app.navigate('history')">
      <span class="material-symbols-outlined">history</span> History
    </button>
    <div style="margin-top:auto; padding: 20px 14px; font-size: 0.75rem; color: var(--text-muted); text-align: center;">
      <button onclick="app.navigate('support')" style="background:none; border:none; color:var(--text-dim); text-decoration:none; display:flex; align-items:center; justify-content:center; gap:6px; margin-bottom:8px; font-weight:600; cursor:pointer; width:100%;">
        <span class="material-symbols-outlined" style="font-size:16px;">support_agent</span> Support & Feedback
      </button>
      &copy; 2026 MarkU
    </div>
  </aside>

  <!-- Header (Mobile) -->
  <header class="app-header">
    <div class="logo" onclick="app.navigate('dashboard')" style="cursor:pointer;">
      <img src="logo.jpg" alt="MarkU" class="header-logo-img">
    </div>
    <div class="header-actions">
      <button class="icon-btn" onclick="app.focusSearch()" aria-label="Search"><span class="material-symbols-outlined" aria-hidden="true">search</span></button>
      <button class="icon-btn" aria-label="Notifications"><span class="material-symbols-outlined" aria-hidden="true">notifications</span></button>
    </div>
  </header>

  <!-- Views -->
  <section id="view-dashboard" class="view active"></section>
  <section id="view-skills" class="view"></section>
  <section id="view-skill-category" class="view"></section>
  <section id="view-skill-tool" class="view"></section>
  <section id="view-content" class="view"></section>
  <section id="view-campaigns" class="view"></section>
  <section id="view-analytics" class="view"></section>
  <section id="view-history" class="view"></section>
  <section id="view-settings" class="view"></section>
  <section id="view-support" class="view"></section>

  <!-- Bottom Navigation (Mobile) -->
  <nav class="bottom-nav">
    <button class="nav-item active" data-view="dashboard" onclick="app.navigate('dashboard')">
      <span class="material-symbols-outlined">home</span>
      <span>Home</span>
    </button>
    <button class="nav-item" data-view="skills" onclick="app.navigate('skills')">
      <span class="material-symbols-outlined">auto_awesome</span>
      <span>Skills</span>
    </button>
    <button class="nav-item" data-view="content" onclick="app.navigate('content')">
      <span class="material-symbols-outlined">edit_note</span>
      <span>Content</span>
    </button>
    <button class="nav-item" data-view="campaigns" onclick="app.navigate('campaigns')">
      <span class="material-symbols-outlined">campaign</span>
      <span>Ads</span>
    </button>
    <button class="nav-item" data-view="history" onclick="app.navigate('history')">
      <span class="material-symbols-outlined">history</span>
      <span>History</span>
    </button>
    <button class="nav-item" data-view="settings" onclick="app.navigate('settings')">
      <span class="material-symbols-outlined">settings</span>
      <span>Settings</span>
    </button>
  </nav>

  <div id="modal-container"></div>
  <script src="skills-data.js?v=4"></script>
  <script src="app.js?v=4"></script>
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('./sw.js')
          .then(registration => console.log('SW registered'))
          .catch(err => console.log('SW registration failed: ', err));
      });
    }
  </script>
</body>
</html>
